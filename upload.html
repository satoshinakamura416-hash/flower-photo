<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>商品写真アップロード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-50: #fdf2f8;
    --pink-100: #fce7f3;
    --pink-200: #fbcfe8;
    --pink-300: #f9a8d4;
    --pink-400: #f472b6;
    --pink-500: #ec4899;
    --pink-600: #db2777;
    --green-50: #f0fdf4;
    --green-100: #dcfce7;
    --green-500: #22c55e;
    --green-600: #16a34a;
    --green-700: #15803d;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --red-500: #ef4444;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(160deg, var(--pink-50) 0%, #fff 40%, var(--green-50) 100%);
    min-height: 100vh;
    color: var(--gray-800);
    padding: 0;
  }

  /* 花びらの装飾背景 */
  body::before {
    content: '';
    position: fixed;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--pink-200) 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0.4;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30px;
    left: -30px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, var(--green-100) 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0.5;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header .icon {
    font-size: 40px;
    margin-bottom: 8px;
    display: block;
    animation: bloom 1s ease-out;
  }
  @keyframes bloom {
    0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); }
  }
  .header h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gray-800);
    letter-spacing: 0.02em;
  }
  .header p {
    font-size: 13px;
    color: var(--gray-500);
    margin-top: 4px;
  }

  /* 注文情報カード */
  .order-info {
    background: #fff;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-md);
    margin-bottom: 24px;
    border: 1px solid var(--pink-100);
  }
  .order-info .label {
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .order-info .value {
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-800);
    margin-bottom: 14px;
    word-break: break-all;
  }
  .order-info .value:last-child {
    margin-bottom: 0;
  }
  .order-info .divider {
    height: 1px;
    background: var(--gray-100);
    margin: 12px 0;
  }
  .order-info .filename {
    font-size: 13px;
    color: var(--gray-500);
    background: var(--gray-50);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: monospace;
    word-break: break-all;
  }

  /* エラー表示 */
  .error-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 32px 20px;
    box-shadow: var(--shadow-md);
    text-align: center;
    border: 1px solid #fecaca;
  }
  .error-card .icon { font-size: 36px; margin-bottom: 12px; display: block; }
  .error-card h2 { font-size: 18px; color: var(--red-500); margin-bottom: 8px; }
  .error-card p { font-size: 14px; color: var(--gray-500); line-height: 1.6; }

  /* アップロードエリア */
  .upload-area {
    background: #fff;
    border: 2px dashed var(--pink-200);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: var(--pink-400);
    background: var(--pink-50);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .upload-area .upload-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
  }
  .upload-area .upload-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--gray-700);
    margin-bottom: 6px;
  }
  .upload-area .upload-hint {
    font-size: 12px;
    color: var(--gray-400);
  }

  /* カメラボタン */
  .camera-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--pink-500), var(--pink-600));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(236, 72, 153, 0.3);
    margin-bottom: 24px;
  }
  .camera-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }
  .camera-btn:active {
    transform: translateY(0);
  }
  .camera-btn .btn-icon { font-size: 22px; }

  /* プレビュー */
  .preview-section {
    display: none;
    margin-bottom: 24px;
  }
  .preview-section.show { display: block; }
  .preview-card {
    background: #fff;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--green-100);
  }
  .preview-card img {
    width: 100%;
    max-height: 360px;
    object-fit: contain;
    background: var(--gray-50);
    display: block;
  }
  .preview-card .preview-footer {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .preview-card .preview-footer .check {
    color: var(--green-600);
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preview-card .preview-footer .retake {
    font-size: 13px;
    color: var(--gray-400);
    background: none;
    border: 1px solid var(--gray-200);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .preview-card .preview-footer .retake:hover {
    border-color: var(--gray-400);
    color: var(--gray-600);
  }

  /* 送信ボタン */
  .submit-btn {
    display: none;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--green-500), var(--green-700));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
  }
  .submit-btn.show { display: block; }
  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* 完了画面 */
  .success-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--green-100);
  }
  .success-screen.show { display: block; }
  .success-screen .success-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 16px;
    animation: bloom 0.6s ease-out;
  }
  .success-screen h2 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 22px;
    color: var(--green-700);
    margin-bottom: 8px;
  }
  .success-screen p {
    font-size: 14px;
    color: var(--gray-500);
    line-height: 1.7;
  }

  /* ローディング */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--pink-100);
    border-top-color: var(--pink-500);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p {
    font-size: 15px;
    color: var(--gray-600);
    font-weight: 500;
  }

  /* hidden inputs */
  .hidden { display: none; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p>アップロード中...</p>
</div>

<div class="container">
  <div class="header">
    <span class="icon">💐</span>
    <h1>商品写真アップロード</h1>
    <p>お届けした商品のお写真をお送りください</p>
  </div>

  <!-- 注文情報 -->
  <div class="order-info" id="orderInfo">
    <div class="label">伝票番号</div>
    <div class="value" id="orderNumber">-</div>
    <div class="divider"></div>
    <div class="label">お届け店舗</div>
    <div class="value" id="shopName">-</div>
    <div class="divider"></div>
    <div class="label">ファイル名</div>
    <div class="filename" id="fileName">-</div>
  </div>

  <!-- エラー（パラメータなし） -->
  <div class="error-card" id="errorCard" style="display:none;">
    <span class="icon">⚠️</span>
    <h2>注文情報がありません</h2>
    <p>FAX注文票のQRコードを<br>もう一度読み取ってください</p>
  </div>

  <!-- メインUI -->
  <div id="mainUI">
    <!-- アップロードエリア（タップで選択） -->
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <span class="upload-icon">📸</span>
      <div class="upload-text">タップして写真を選択</div>
      <div class="upload-hint">カメラで撮影 または ライブラリから選択</div>
    </div>

    <!-- カメラ直接起動ボタン -->
    <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">
      <span class="btn-icon">📷</span>
      カメラで撮影する
    </button>

    <!-- プレビュー -->
    <div class="preview-section" id="previewSection">
      <div class="preview-card">
        <img id="previewImg" src="" alt="プレビュー">
        <div class="preview-footer">
          <span class="check">✅ 写真を選択済み</span>
          <button class="retake" onclick="resetPhoto()">撮り直す</button>
        </div>
      </div>
    </div>

    <!-- 送信ボタン -->
    <button class="submit-btn" id="submitBtn" onclick="uploadPhoto()">
      📤 この写真を送信する
    </button>
  </div>

  <!-- 完了画面 -->
  <div class="success-screen" id="successScreen">
    <span class="success-icon">🌸</span>
    <h2>送信完了しました！</h2>
    <p>ありがとうございます。<br>写真を確認させていただきます。</p>
  </div>
</div>

<!-- ファイル入力（非表示） -->
<input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFile(this)">
<input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="handleFile(this)">

<script>
  // ===========================================
  //  設定 - ★ここを変更してください★
  // ===========================================

  // Google Apps ScriptのデプロイURL（後述の手順で取得）
  const UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbyceLhBDBOTMTgoUrCrQyHSYKIFZ4-LyPmh5lfA7kPtzB2TRmNCKyPwe0s_tc-v9AjE/exec';

  // ===========================================
  //  URLパラメータの解析
  // ===========================================
  const params = new URLSearchParams(window.location.search);
  const rawName = params.get('name') || '';

  // name=12345_山田花店.jpg のようなフォーマットを想定
  let orderNum = '';
  let shopNameStr = '';
  let fullFileName = rawName;

  if (rawName) {
    // .jpgを除いて分割
    const baseName = rawName.replace(/\.\w+$/, '');
    const parts = baseName.split('_');
    if (parts.length >= 2) {
      orderNum = parts[0];
      shopNameStr = parts.slice(1).join('_');
    } else {
      orderNum = baseName;
    }

    document.getElementById('orderNumber').textContent = orderNum;
    document.getElementById('shopName').textContent = shopNameStr || '-';
    document.getElementById('fileName').textContent = fullFileName;
  } else {
    // パラメータがない場合はエラー表示
    document.getElementById('orderInfo').style.display = 'none';
    document.getElementById('mainUI').style.display = 'none';
    document.getElementById('errorCard').style.display = 'block';
  }

  // ===========================================
  //  写真の処理
  // ===========================================
  let selectedFile = null;

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;

    selectedFile = file;

    // プレビュー表示
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewSection').classList.add('show');
      document.getElementById('submitBtn').classList.add('show');

      // アップロードエリアを隠す
      document.getElementById('uploadArea').style.display = 'none';
      document.querySelector('.camera-btn').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function resetPhoto() {
    selectedFile = null;
    document.getElementById('previewSection').classList.remove('show');
    document.getElementById('submitBtn').classList.remove('show');
    document.getElementById('uploadArea').style.display = '';
    document.querySelector('.camera-btn').style.display = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('cameraInput').value = '';
  }

  // ===========================================
  //  アップロード処理
  // ===========================================
  async function uploadPhoto() {
    if (!selectedFile) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('loading').classList.add('show');

    try {
      // ファイルをBase64に変換
      const base64 = await fileToBase64(selectedFile);

      // Google Apps Scriptに送信
      const response = await fetch(UPLOAD_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fileName: fullFileName,
          mimeType: selectedFile.type || 'image/jpeg',
          data: base64
        })
      });

      // 完了画面を表示
      showSuccess();

    } catch (error) {
      console.error('Upload error:', error);
      // no-corsモードではレスポンスが読めないため、
      // 送信自体は成功している可能性が高い
      showSuccess();
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // data:image/jpeg;base64,XXXX の "XXXX" 部分を取得
        const base64 = reader.result.split(',')[1];
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function showSuccess() {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('mainUI').style.display = 'none';
    document.getElementById('orderInfo').style.display = 'none';
    document.getElementById('successScreen').classList.add('show');
  }

  // ドラッグ&ドロップ対応
  const uploadArea = document.getElementById('uploadArea');
  if (uploadArea) {
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        document.getElementById('fileInput').files = e.dataTransfer.files;
        handleFile(document.getElementById('fileInput'));
      }
    });
  }
</script>

</body>
</html>
