<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>商品写真アップロード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-50: #fdf2f8;
    --pink-100: #fce7f3;
    --pink-200: #fbcfe8;
    --pink-400: #f472b6;
    --pink-500: #ec4899;
    --pink-600: #db2777;
    --green-50: #f0fdf4;
    --green-100: #dcfce7;
    --green-500: #22c55e;
    --green-600: #16a34a;
    --green-700: #15803d;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --red-500: #ef4444;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(160deg, var(--pink-50) 0%, #fff 40%, var(--green-50) 100%);
    min-height: 100vh;
    min-height: 100dvh;
    color: var(--gray-800);
    padding: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 24px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ヘッダー - コンパクト */
  .header {
    text-align: center;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-800);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .header h1 .icon { font-size: 24px; }
  .header p {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 2px;
  }

  /* 注文情報 - 1行コンパクト表示 */
  .order-info {
    background: #fff;
    border-radius: 10px;
    padding: 10px 14px;
    box-shadow: var(--shadow-md);
    margin-bottom: 14px;
    border: 1px solid var(--pink-100);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .order-info .info-item {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .order-info .label {
    font-size: 10px;
    font-weight: 500;
    color: var(--gray-400);
    white-space: nowrap;
  }
  .order-info .value {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-800);
    word-break: break-all;
  }
  .order-info .separator {
    color: var(--gray-200);
    font-size: 14px;
  }

  /* エラー表示 */
  .error-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 32px 20px;
    box-shadow: var(--shadow-md);
    text-align: center;
    border: 1px solid #fecaca;
  }
  .error-card .icon { font-size: 36px; margin-bottom: 12px; display: block; }
  .error-card h2 { font-size: 18px; color: var(--red-500); margin-bottom: 8px; }
  .error-card p { font-size: 14px; color: var(--gray-500); line-height: 1.6; }

  /* メインUI */
  #mainUI {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* 大きなボタン2つ */
  .big-btn {
    flex: 1;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    padding: 16px;
  }
  .big-btn .btn-icon { font-size: 36px; }
  .big-btn .btn-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .big-btn .btn-hint {
    font-size: 11px;
    opacity: 0.8;
  }

  .btn-camera {
    background: linear-gradient(135deg, var(--pink-500), var(--pink-600));
    color: #fff;
    box-shadow: 0 4px 16px rgba(236, 72, 153, 0.3);
  }
  .btn-camera:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }
  .btn-camera:active { transform: translateY(0); }

  .btn-gallery {
    background: #fff;
    color: var(--gray-700);
    border: 2px solid var(--pink-200);
    box-shadow: var(--shadow-md);
  }
  .btn-gallery:hover {
    border-color: var(--pink-400);
    background: var(--pink-50);
    transform: translateY(-2px);
  }
  .btn-gallery:active { transform: translateY(0); }

  /* プレビュー */
  .preview-section {
    display: none;
    flex: 1;
    flex-direction: column;
  }
  .preview-section.show {
    display: flex;
  }
  .preview-card {
    background: #fff;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--green-100);
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .preview-card img {
    width: 100%;
    max-height: 240px;
    object-fit: contain;
    background: var(--gray-50);
    display: block;
    flex: 1;
  }
  .preview-card .preview-footer {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--gray-100);
  }
  .preview-card .preview-footer .check {
    color: var(--green-600);
    font-size: 13px;
    font-weight: 500;
  }
  .preview-card .preview-footer .retake {
    font-size: 12px;
    color: var(--gray-400);
    background: none;
    border: 1px solid var(--gray-200);
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .preview-card .preview-footer .retake:hover {
    border-color: var(--gray-400);
    color: var(--gray-600);
  }

  /* 送信ボタン */
  .submit-btn {
    display: none;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--green-500), var(--green-700));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
    margin-top: 10px;
  }
  .submit-btn.show { display: block; }
  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* 完了画面 */
  .success-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--green-100);
  }
  .success-screen.show { display: block; }
  .success-screen .success-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 16px;
    animation: bloom 0.6s ease-out;
  }
  @keyframes bloom {
    0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); }
  }
  .success-screen h2 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 22px;
    color: var(--green-700);
    margin-bottom: 8px;
  }
  .success-screen p {
    font-size: 14px;
    color: var(--gray-500);
    line-height: 1.7;
  }

  /* ローディング */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--pink-100);
    border-top-color: var(--pink-500);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p {
    font-size: 15px;
    color: var(--gray-600);
    font-weight: 500;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p>アップロード中...</p>
</div>

<div class="container">
  <div class="header">
    <h1><span class="icon">💐</span> 商品写真アップロード</h1>
    <p>お届けした商品のお写真をお送りください</p>
  </div>

  <!-- 注文情報 - コンパクト1行 -->
  <div class="order-info" id="orderInfo">
    <div class="info-item">
      <span class="label">伝票</span>
      <span class="value" id="orderNumber">-</span>
    </div>
    <span class="separator">|</span>
    <div class="info-item">
      <span class="label">店舗</span>
      <span class="value" id="shopName">-</span>
    </div>
  </div>

  <!-- エラー（パラメータなし） -->
  <div class="error-card" id="errorCard" style="display:none;">
    <span class="icon">⚠️</span>
    <h2>注文情報がありません</h2>
    <p>FAX注文票のQRコードを<br>もう一度読み取ってください</p>
  </div>

  <!-- メインUI -->
  <div id="mainUI">
    <!-- カメラボタン（大きく目立つ） -->
    <button class="big-btn btn-camera" onclick="document.getElementById('cameraInput').click()">
      <span class="btn-icon">📷</span>
      <span class="btn-text">カメラで撮影する</span>
      <span class="btn-hint">タップでカメラが起動します</span>
    </button>

    <!-- ライブラリから選択 -->
    <button class="big-btn btn-gallery" onclick="document.getElementById('fileInput').click()">
      <span class="btn-icon">🖼️</span>
      <span class="btn-text">写真を選んで送る</span>
      <span class="btn-hint">撮影済みの写真を選択</span>
    </button>

    <!-- プレビュー -->
    <div class="preview-section" id="previewSection">
      <div class="preview-card">
        <img id="previewImg" src="" alt="プレビュー">
        <div class="preview-footer">
          <span class="check">✅ 写真OK</span>
          <button class="retake" onclick="resetPhoto()">撮り直す</button>
        </div>
      </div>
    </div>

    <!-- 送信ボタン -->
    <button class="submit-btn" id="submitBtn" onclick="uploadPhoto()">
      📤 この写真を送信する
    </button>
  </div>

  <!-- 完了画面 -->
  <div class="success-screen" id="successScreen">
    <span class="success-icon">🌸</span>
    <h2>送信完了しました！</h2>
    <p>ありがとうございます。<br>写真を確認させていただきます。</p>
  </div>
</div>

<!-- ファイル入力（非表示） -->
<input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFile(this)">
<input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="handleFile(this)">

<script>
  // ===========================================
  //  設定 - ★ここを変更してください★
  // ===========================================
  const UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbyceLhBDBOTMTgoUrCrQyHSYKIFZ4-LyPmh5lfA7kPtzB2TRmNCKyPwe0s_tc-v9AjE/exec';

  // ===========================================
  //  URLパラメータの解析
  // ===========================================
  const params = new URLSearchParams(window.location.search);
  const rawName = params.get('name') || '';

  let orderNum = '';
  let shopNameStr = '';
  let fullFileName = rawName;

  if (rawName) {
    const baseName = rawName.replace(/\.\w+$/, '');
    const parts = baseName.split('_');
    if (parts.length >= 2) {
      orderNum = parts[0];
      shopNameStr = parts.slice(1).join('_');
    } else {
      orderNum = baseName;
    }
    document.getElementById('orderNumber').textContent = orderNum;
    document.getElementById('shopName').textContent = shopNameStr || '-';
  } else {
    document.getElementById('orderInfo').style.display = 'none';
    document.getElementById('mainUI').style.display = 'none';
    document.getElementById('errorCard').style.display = 'block';
  }

  // ===========================================
  //  写真の処理
  // ===========================================
  let selectedFile = null;

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;

    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewSection').classList.add('show');
      document.getElementById('submitBtn').classList.add('show');
      document.querySelectorAll('.big-btn').forEach(b => b.style.display = 'none');
    };
    reader.readAsDataURL(file);
  }

  function resetPhoto() {
    selectedFile = null;
    document.getElementById('previewSection').classList.remove('show');
    document.getElementById('submitBtn').classList.remove('show');
    document.querySelectorAll('.big-btn').forEach(b => b.style.display = '');
    document.getElementById('fileInput').value = '';
    document.getElementById('cameraInput').value = '';
  }

  // ===========================================
  //  アップロード処理
  // ===========================================
  async function uploadPhoto() {
    if (!selectedFile) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('loading').classList.add('show');

    try {
      const base64 = await fileToBase64(selectedFile);

      const response = await fetch(UPLOAD_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fileName: fullFileName,
          mimeType: selectedFile.type || 'image/jpeg',
          data: base64
        })
      });

      showSuccess();
    } catch (error) {
      console.error('Upload error:', error);
      showSuccess();
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function showSuccess() {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('mainUI').style.display = 'none';
    document.getElementById('orderInfo').style.display = 'none';
    document.getElementById('successScreen').classList.add('show');
  }
</script>

</body>
</html>
